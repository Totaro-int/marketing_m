<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>멜라누아 · 인사이트</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{--bg:#000;--card:#0e0e11;--line:rgba(255,255,255,.14);--line2:rgba(255,255,255,.24);--ink:#f5f5f7;--dim:#9a9aa0;--muted:#6e6e73}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Pretendard,system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.top{display:flex;align-items:center;gap:14px;padding:20px 24px;max-width:1200px;margin:0 auto}
.top img{height:16px;width:auto;display:block;opacity:.95}
.top .tag{margin-left:auto;color:var(--dim);font-size:12px;border:1px solid var(--line);padding:7px 12px;border-radius:999px}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.hero{padding:56px 0 30px}
.eyebrow{font-family:"Barlow Condensed","Pretendard",sans-serif;color:var(--dim);letter-spacing:.28em;font-size:12px;font-weight:600;text-transform:uppercase;margin-bottom:16px}
.hero h1{font-size:clamp(30px,4.6vw,52px);line-height:1.18;letter-spacing:-.02em;font-weight:800;color:#fff}
.hero p{color:var(--dim);font-size:16px;margin-top:16px;max-width:560px;line-height:1.65}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:28px 0 8px}
.tab{background:transparent;border:1px solid var(--line);color:var(--dim);padding:9px 18px;border-radius:999px;font-size:13.5px;cursor:pointer;font-family:inherit;transition:.15s}
.tab:hover{color:var(--ink);border-color:var(--line2)}
.tab.on{background:#f5f5f7;border-color:#f5f5f7;color:#000;font-weight:700}
.crow{position:relative;padding:22px 0 60px}
.rail{display:flex;gap:20px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;padding:6px 2px 16px;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.card{flex:0 0 300px;scroll-snap-align:start;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .18s,border-color .18s,box-shadow .18s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-6px);border-color:var(--line2);box-shadow:0 16px 40px rgba(0,0,0,.6)}
/* 썸네일: 항상 보이는 그라디언트 배경 + 이미지 오버레이. 이미지 실패/없음이면 제목 폴백(.ph) */
.thumb{position:relative;aspect-ratio:4/5;overflow:hidden;background:radial-gradient(120% 120% at 30% 20%,#1e1e23 0%,#0a0a0c 72%)}
.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.ph{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;padding:22px;font-size:20px;font-weight:800;line-height:1.32;letter-spacing:-.01em;color:#eDeDef}
.thumb.noimg .ph{display:flex}
.cat{position:absolute;top:12px;left:12px;z-index:2;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:#fff;font-size:11px;font-weight:600;letter-spacing:.04em;padding:5px 10px;border-radius:999px;border:1px solid var(--line)}
.b{padding:16px 16px 18px}
.b h3{font-size:16px;line-height:1.4;font-weight:700;letter-spacing:-.01em;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.b p{color:var(--dim);font-size:13px;line-height:1.6;margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.b .tg{margin-top:12px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b .dt{color:var(--muted);font-size:11.5px;margin-top:10px}
.nav{position:absolute;top:42%;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;transition:.15s}
.nav:hover{background:#f5f5f7;color:#000;border-color:#f5f5f7}
.nav.prev{left:-10px}.nav.next{right:-10px}
@media(max-width:560px){.nav{display:none}.card{flex-basis:78vw}}
.empty{color:var(--dim);padding:50px 0;text-align:center}
.foot{color:var(--muted);font-size:12px;text-align:center;padding:26px 0 50px;border-top:1px solid var(--line);margin-top:10px}
</style></head>
<body>
<div class="top"><img src="https://res.cloudinary.com/dssuxurpt/image/upload/v1778836628/MELANOIR_sg2_white_bpaxvi.png" alt="MELANOIR"><span class="tag">미리보기 · 자체완결 HTML</span></div>
<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Melanoir Insights</div>
    <h1>안전한 색, 숫자로 이야기하다</h1>
    <p>멜라닌·반영구 색소의 안전성과 과학을, 한 장의 카드로. 매일 쌓이는 멜라누아의 인사이트.</p>
    <div class="tabs" id="tabs"></div>
  </section>
  <div class="crow">
    <button class="nav prev" id="prev" aria-label="이전">‹</button>
    <div class="rail" id="rail"></div>
    <button class="nav next" id="next" aria-label="다음">›</button>
  </div>
</div>
<div class="foot">© MELANOIR · 미리보기용 자체완결 파일(발행 시스템 무관) · 이미지 없으면 제목 카드로 표시</div>
<script>
const CARDS = [{"title":"1회용 멸균 설계","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/10-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"소재가 곧 시그니처","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/08-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"베타테스터 모집","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/09-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"내 몸이 가장 잘 아는 색소","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/02-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"더 뺄 것이 없을 때 완성","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/03-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"숫자가 먼저 말한다","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/04-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"0.00 (피부 자극 지수)","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/05-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"97% (세포 생존율)","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/06-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"All N.D. (필수 항목 불검출)","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/07-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-07-01","category":"브랜드 인사이트"},{"title":"지구에서 가장 안전한 Black","body":"가장 안전한 검정은 몸이 직접 만드는 색(멜라닌)이며, 그 안전을 숫자로 증명하려는 여정이다.","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/insight/daily-2026-06-25-01.png","tags":[],"date":"2026-06-25","category":"브랜드 인사이트"},{"title":"지구에서 가장 안전한 Black","body":"","image":"https://inrvgokeuyewwvaxwitc.supabase.co/storage/v1/object/public/card-images/instagram/01-s1.png","tags":["#멜라누아","#반영구색소"],"date":"2026-06-24","category":"브랜드 인사이트"}];
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let cat='전체';
function cardHtml(c){
  const tags=(c.tags||[]).join(' ');
  const t=esc(c.title);
  const img=c.image
    ? '<img src="'+esc(c.image)+'" alt="'+t+'" loading="lazy" onerror="this.style.display=\'none\';this.closest(\'.thumb\').classList.add(\'noimg\')">'
    : '';
  return '<div class="card">'
    +'<div class="thumb'+(c.image?'':' noimg')+'">'+img+'<div class="ph">'+t+'</div><span class="cat">'+esc(c.category)+'</span></div>'
    +'<div class="b"><h3>'+t+'</h3><p>'+esc(c.body)+'</p>'+(tags?'<div class="tg">'+esc(tags)+'</div>':'')+'<div class="dt">'+esc(c.date)+'</div></div>'
    +'</div>';
}
function render(){
  const list=cat==='전체'?CARDS:CARDS.filter(c=>c.category===cat);
  $('#rail').innerHTML=list.length?list.map(cardHtml).join(''):'<div class="empty">이 분류의 인사이트가 아직 없습니다.</div>';
}
function tabs(){
  const cats=['전체',...new Set(CARDS.map(c=>c.category))];
  $('#tabs').innerHTML=cats.map(c=>'<button class="tab'+(c===cat?' on':'')+'" data-c="'+esc(c)+'">'+esc(c)+'</button>').join('');
  $('#tabs').querySelectorAll('.tab').forEach(b=>b.onclick=()=>{cat=b.dataset.c;tabs();render();});
}
tabs();render();
$('#prev').onclick=()=>$('#rail').scrollBy({left:-640,behavior:'smooth'});
$('#next').onclick=()=>$('#rail').scrollBy({left:640,behavior:'smooth'});
</script></body></html>
