<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex"><title>블로그 미리보기 — 멜라누아</title>
<style>
:root{--bg:#0e0e10;--panel:#17171a;--line:#2a2a30;--ink:#f3f3f4;--dim:#9a9aa2;--gold:#c2a15a}
*{box-sizing:border-box} body{margin:0;font-family:Pretendard,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
header h1{font-size:15px;margin:0;font-weight:700} header .sub{color:var(--dim);font-size:12.5px}
header .rt{margin-left:auto;display:flex;gap:8px}
header button,header a{color:var(--ink);text-decoration:none;font-size:13px;border:1px solid var(--line);background:var(--panel);padding:8px 13px;border-radius:8px;cursor:pointer;font-family:inherit}
header button.pri{background:var(--gold);border-color:var(--gold);color:#1a1408;font-weight:600}
.shell{max-width:760px;margin:26px auto;padding:0 18px}
/* 실제 네이버 블로그 느낌: 흰 본문 카드, 넉넉한 행간 */
.post{background:#fff;color:#1f1f1f;border-radius:14px;padding:46px 44px 56px;box-shadow:0 10px 50px rgba(0,0,0,.45);line-height:1.95;font-size:16.5px;letter-spacing:-.01em}
.post .ptitle{font-size:27px;font-weight:800;line-height:1.4;margin:0 0 6px;letter-spacing:-.02em}
.post .pmeta{color:#9aa0a6;font-size:13px;margin:0 0 30px;padding-bottom:18px;border-bottom:1px solid #eee}
.post h2{font-size:20px;font-weight:700;margin:36px 0 12px;color:#111}
.post p{margin:0 0 17px;color:#33363b}
.post figure{margin:26px 0;text-align:center}
.post figure img{width:100%;border-radius:12px;display:block;background:#111}
.post figcaption{color:#9aa0a6;font-size:13px;margin-top:9px}
.post .imgmiss{border:1.5px dashed #d4b86a;background:#fbf6ea;color:#9c7a23;border-radius:12px;padding:30px;font-size:14px}
.tags{margin:30px 0 0;display:flex;flex-wrap:wrap;gap:8px}
.tags span{color:#1a73c0;font-size:14px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#000;border:1px solid var(--line);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1} .empty{color:var(--dim);text-align:center;padding:60px 20px}
</style><script src="config.js"></script></head><body>
<header>
  <h1>블로그 미리보기</h1><span class="sub" id="camp">…</span>
  <div class="rt"><button id="copytxt">본문 텍스트 복사</button><a href="./index.html">← 콘솔</a></div>
</header>
<div class="shell"><article class="post" id="post"><div class="empty">불러오는 중…</div></article></div>
<div class="toast" id="toast"></div>
<script type="module">
const $=id=>document.getElementById(id);
const q=new URLSearchParams(location.search);
const SB_URL=window.SB_URL, SB_ANON=window.SB_ANON, slug=q.get('slug')||'';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
let plain='';

async function load(){
  if(!(SB_URL&&SB_ANON&&slug)){ $('post').innerHTML='<div class="empty">slug/연결 없음</div>'; return; }
  const r=await fetch(`${SB_URL}/rest/v1/marketing_drafts?campaign_slug=eq.${encodeURIComponent(slug)}&channel=in.(naver-blog,instagram)&select=channel,title,body,hashtags,image_urls`,{headers:{apikey:SB_ANON,Authorization:'Bearer '+SB_ANON}});
  const rows=await r.json();
  const nb=rows.find(x=>x.channel==='naver-blog'), ig=rows.find(x=>x.channel==='instagram');
  if(!nb){ $('post').innerHTML='<div class="empty">이 캠페인에 네이버 블로그 글이 없습니다.</div>'; return; }
  const cards=(ig&&ig.image_urls)||[];
  $('camp').textContent=nb.title||slug;
  render(nb,cards);
}

// 🖼 큐 → 카드 인덱스 매핑(이미지N/카드N → N번 카드, 표지/마무리 키워드 폴백)
function cardFor(desc,cards,seq){
  let m=desc.match(/(?:이미지|카드)\s*(\d+)/)||desc.match(/(\d+)/);
  if(m){const n=+m[1]; if(cards[n-1])return cards[n-1];}
  if(/표지|커버|대표/.test(desc))return cards[0];
  if(/마무리|마지막|여정/.test(desc))return cards[cards.length-1];
  return cards[(seq.i++)%(cards.length||1)]||null;
}
function render(nb,cards){
  const seq={i:0}; const out=[]; const txt=[];
  out.push(`<h1 class="ptitle">${esc(nb.title||'')}</h1><p class="pmeta">@melanoir · 멜라누아 블로그</p>`);
  for(const raw of String(nb.body||'').split('\n')){
    const t=raw.trim(); if(!t) continue;
    if(/^🖼/.test(t)){
      const desc=t.replace(/^🖼\s*/,''); const src=cardFor(desc,cards,seq);
      out.push(src?`<figure><img src="${esc(src)}" alt="${esc(desc)}" loading="lazy"><figcaption>${esc(desc)}</figcaption></figure>`
                  :`<div class="imgmiss">🖼 ${esc(desc)}<br><small>(이 캠페인 IG 카드 없음 — 카드 생성 후 표시)</small></div>`);
    } else if(/^[\[【]/.test(t)){ /* 본문 첫 제목줄은 헤더에 이미 표시 → 건너뜀 */ continue; }
    else if(/^[■▪◆●]/.test(t)){ const h=t.replace(/^[■▪◆●]\s*/,''); out.push(`<h2>${esc(h)}</h2>`); txt.push('\n'+h+'\n'); }
    else { out.push(`<p>${esc(t)}</p>`); txt.push(t); }
  }
  const tags=(nb.hashtags||[]); if(tags.length) out.push(`<div class="tags">${tags.map(h=>`<span>${esc(h)}</span>`).join(' ')}</div>`);
  $('post').innerHTML=out.join('');
  plain=(nb.title?nb.title+'\n\n':'')+txt.join('\n')+(tags.length?'\n\n'+tags.join(' '):'');
}
$('copytxt').onclick=async()=>{ try{await navigator.clipboard.writeText(plain);toast('본문 텍스트 복사됨 (이미지는 위 위치에 삽입)');}catch{toast('복사 실패')} };
load().catch(e=>{$('post').innerHTML='<div class="empty">오류: '+esc(e.message)+'</div>';});
</script></body></html>
