<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex"><title>인스타 카드 편집 — 멜라누아</title>
<style>
:root{--bg:#0e0e10;--panel:#17171a;--line:#2a2a30;--line2:#3a3a42;--ink:#f3f3f4;--dim:#9a9aa2;--gold:#c2a15a;--ok:#3fae72}
*{box-sizing:border-box} body{margin:0;font-family:Pretendard,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel)}
header h1{font-size:15px;margin:0;font-weight:700} header .sub{color:var(--dim);font-size:12.5px}
header a{margin-left:auto;color:var(--dim);text-decoration:none;font-size:13px;border:1px solid var(--line2);padding:7px 12px;border-radius:8px}
.wrap{display:grid;grid-template-columns:1fr 380px;gap:24px;max-width:1180px;margin:0 auto;padding:24px 20px;align-items:start}
.stage{display:flex;flex-direction:column;align-items:center;gap:16px}
.card-frame{background:#000;border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5);width:min(440px,80vw)}
canvas#card{display:block;width:100%;height:auto;background:#000}
.nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.nav button{width:40px;height:40px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--dim);font-weight:600;cursor:pointer}
.nav button.on{background:var(--ink);color:#111;border-color:var(--ink)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
.panel h2{font-size:13px;margin:0 0 12px;color:var(--dim);font-weight:600;letter-spacing:.02em}
.drop{border:1.5px dashed var(--line2);border-radius:11px;padding:18px;text-align:center;color:var(--dim);font-size:13px;cursor:pointer;margin-bottom:8px}
.drop:hover{border-color:var(--gold);color:var(--ink)}
.fld{margin:12px 0} .fld label{display:block;font-size:11.5px;color:var(--dim);margin-bottom:5px}
.fld input,.fld textarea{width:100%;background:#0c0c0e;border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:9px 11px;font:inherit;font-size:13.5px}
.fld textarea{min-height:74px;resize:vertical;line-height:1.5}
.hint{font-size:11px;color:var(--dim);margin-top:4px}
.row{display:flex;gap:9px;margin-top:14px}
button.act{flex:1;padding:11px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);font:inherit;font-weight:600;cursor:pointer}
button.pri{background:var(--gold);border-color:var(--gold);color:#1a1408}
button.act:hover{filter:brightness(1.08)}
.bgrow{display:flex;gap:8px;margin-top:8px} .bgrow button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--line2);background:#0c0c0e;color:var(--dim);font:inherit;font-size:12px;cursor:pointer}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#000;border:1px solid var(--line2);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1} .note{color:var(--dim);font-size:12.5px;line-height:1.6}
.busy{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;color:#fff;font-size:14px;z-index:9}
</style></head><body>
<header>
  <h1>인스타 카드 편집</h1><span class="sub" id="camp">…</span>
  <a href="./index.html">← 콘솔</a>
</header>
<div class="wrap">
  <div class="stage">
    <div class="card-frame"><canvas id="card" width="1080" height="1350"></canvas></div>
    <div class="nav" id="nav"></div>
  </div>
  <div class="panel">
    <h2>배경 — 카드별 교체</h2>
    <div class="drop" id="drop">📷 배경 사진 올리기 (이 카드)<br><span class="hint">클릭 또는 끌어다 놓기 · 1080×1350 권장</span></div>
    <div class="bgrow"><button id="bgreset">기본 배경 복원</button><button id="bgall">이 배경 8장 전체 적용</button></div>
    <input type="file" id="bgfile" accept="image/*" hidden>
    <h2 style="margin-top:20px">텍스트 — 말로 고치듯 직접 수정</h2>
    <div id="fields"></div>
    <div class="hint">본문 강조는 <b>**별표**</b> 로 감싸면 흰색+골드 밑줄.</div>
    <div class="row"><button class="act" id="dl1">이 카드 PNG</button><button class="act pri" id="dlall">8장 모두 저장</button></div>
    <p class="note" style="margin-top:14px">저장한 PNG를 인스타에 그대로 업로드하세요. 캡션·해시태그는 콘솔에서 복사.</p>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="busy" id="busy">렌더링 중…</div>
<script src="config.js"></script>
<script type="module">
import { renderSlide, loadImageEl, loadFonts } from './card-render.js';
const $=id=>document.getElementById(id);
const q=new URLSearchParams(location.search);
const SB_URL=window.SB_URL, SB_ANON=window.SB_ANON;
const BG_BASE = SB_URL ? SB_URL.replace(/\/$/,'')+'/storage/v1/object/public/card-images/bg/' : '';
const defBgUrl = s => (s&&s.image&&BG_BASE) ? BG_BASE + s.image.split('/').pop().replace(/\.[^.]+$/,'') + '.jpg' : null;
let slides=[], bgimgs=[], cur=0, slug=q.get('slug')||'';
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
const busy=v=>$('busy').style.display=v?'flex':'none';

// ---- 스펙 로드: Supabase(anon) → 없으면 ?spec= URL(dev) ----
async function loadSpec(){
  if(SB_URL&&SB_ANON&&slug){
    const r=await fetch(`${SB_URL}/rest/v1/marketing_drafts?campaign_slug=eq.${encodeURIComponent(slug)}&channel=eq.instagram&select=spec,title`,{headers:{apikey:SB_ANON,Authorization:'Bearer '+SB_ANON}});
    const rows=await r.json(); const row=rows&&rows[0];
    if(row&&row.spec&&row.spec.slides){ $('camp').textContent=(row.title||slug); return row.spec.slides; }
  }
  if(q.get('spec')){ const s=await (await fetch(q.get('spec'))).json(); $('camp').textContent=s.topic||'(dev)'; return s.slides; }
  $('camp').textContent='(스펙 없음)'; return [];
}

// ---- segments ↔ **강조** 텍스트 ----
const segToText=segs=>(segs||[]).map(([t,k])=>k?`**${t}**`:t).join('');
function textToSeg(text){const out=[];const re=/\*\*(.+?)\*\*/g;let last=0,m;while((m=re.exec(text))){if(m.index>last)out.push([text.slice(last,m.index),false]);out.push([m[1],true]);last=re.lastIndex;}if(last<text.length)out.push([text.slice(last),false]);return out.length?out:[[text,false]];}

async function renderCur(){
  if(!slides[cur])return; busy(true);
  try{ await loadFonts(); const c=await renderSlide(slides[cur],bgimgs[cur]||null);
    const card=$('card');card.width=c.width;card.height=c.height;card.getContext('2d').drawImage(c,0,0);
  }catch(e){toast('렌더 오류: '+e.message);} busy(false);
}
function renderNav(){ $('nav').innerHTML=slides.map((s,i)=>`<button class="${i===cur?'on':''}" data-i="${i}">${i+1}</button>`).join('');
  $('nav').querySelectorAll('button').forEach(b=>b.onclick=()=>{cur=+b.dataset.i;renderNav();renderFields();renderCur();}); }
function fld(label,val,oninput,ta){const id='f'+Math.random().toString(36).slice(2);const el=ta?`<textarea id="${id}">${val.replace(/</g,'&lt;')}</textarea>`:`<input id="${id}" value="${val.replace(/"/g,'&quot;')}">`;
  return {html:`<div class="fld"><label>${label}</label>${el}</div>`,bind:()=>{$(id).addEventListener('input',e=>{oninput(e.target.value);clearTimeout(window._rt);window._rt=setTimeout(renderCur,200);});}};}
function renderFields(){ const s=slides[cur];const parts=[];
  if(s.type==='cover_stmt'||s.type==='closing'){ parts.push(fld('제목 (줄바꿈으로 분리)',(s.lines||[]).join('\n'),v=>s.lines=v.split('\n').filter(x=>x.trim()),true)); }
  else if(s.type==='cover_data'){ parts.push(fld('숫자',s.number||'',v=>s.number=v)); parts.push(fld('라벨',s.label||'',v=>s.label=v)); parts.push(fld('후킹',s.hook||'',v=>s.hook=v)); }
  else if(s.type==='body'){ parts.push(fld('번호',s.num||'',v=>s.num=v)); parts.push(fld('소제목',s.title||'',v=>s.title=v)); parts.push(fld('본문 (**강조**)',segToText(s.segments),v=>s.segments=textToSeg(v),true)); }
  $('fields').innerHTML=parts.map(p=>p.html).join(''); parts.forEach(p=>p.bind());
}
// ---- 배경 업로드 ----
async function setBg(file,all){ try{ const img=await loadImageEl(file); if(all){bgimgs=slides.map(()=>img);toast('8장 전체 배경 적용');}else{bgimgs[cur]=img;toast('배경 교체됨');} renderCur(); }catch(e){toast('이미지 로드 실패');} }
$('drop').onclick=()=>$('bgfile').click();
$('bgfile').onchange=e=>{if(e.target.files[0])setBg(e.target.files[0],false);e.target.value='';};
$('drop').ondragover=e=>{e.preventDefault();$('drop').style.borderColor='var(--gold)';};
$('drop').ondragleave=()=>$('drop').style.borderColor='';
$('drop').ondrop=e=>{e.preventDefault();$('drop').style.borderColor='';if(e.dataTransfer.files[0])setBg(e.dataTransfer.files[0],false);};
$('bgreset').onclick=async()=>{const u=defBgUrl(slides[cur]);bgimgs[cur]=u?await loadImageEl(u).catch(()=>null):null;renderCur();toast('기본 배경 복원');};
$('bgall').onclick=()=>{if(bgimgs[cur]){const im=bgimgs[cur];bgimgs=slides.map(()=>im);renderCur();toast('이 배경을 8장 전체 적용');}else toast('먼저 이 카드에 배경을 올리세요');};
// ---- PNG 추출 ----
const dlCanvas=(c,name)=>c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);},'image/png');
$('dl1').onclick=async()=>{busy(true);const c=await renderSlide(slides[cur],bgimgs[cur]||null);dlCanvas(c,`melanoir_${slug||'card'}_${String(cur+1).padStart(2,'0')}.png`);busy(false);toast('이 카드 저장');};
$('dlall').onclick=async()=>{busy(true);for(let i=0;i<slides.length;i++){const c=await renderSlide(slides[i],bgimgs[i]||null);dlCanvas(c,`melanoir_${slug||'card'}_${String(i+1).padStart(2,'0')}.png`);await new Promise(r=>setTimeout(r,350));}busy(false);toast(slides.length+'장 저장 완료');};

(async()=>{ busy(true); slides=await loadSpec();
  bgimgs=await Promise.all(slides.map(async s=>{const u=defBgUrl(s);if(!u)return null;try{return await loadImageEl(u);}catch{return null;}}));
  if(!slides.length){$('fields').innerHTML='<p class="note">이 캠페인의 인스타 스펙을 찾지 못했습니다. 콘솔에서 카드 편집을 다시 여세요.</p>';busy(false);return;}
  renderNav();renderFields();await renderCur(); busy(false);
  window.__ready=true;
})();
</script></body></html>
