<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex"><title>자사몰 인사이트 미리보기 — 멜라누아</title>
<style>
:root{--bg:#0e0e10;--panel:#17171a;--line:#2a2a30;--ink:#f3f3f4;--dim:#9a9aa2;--gold:#c2a15a}
*{box-sizing:border-box} body{margin:0;font-family:Pretendard,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
header h1{font-size:15px;margin:0;font-weight:700} header .sub{color:var(--dim);font-size:12.5px}
header .rt{margin-left:auto;display:flex;gap:8px}
header button,header a{color:var(--ink);text-decoration:none;font-size:13px;border:1px solid var(--line);background:var(--panel);padding:8px 13px;border-radius:8px;cursor:pointer;font-family:inherit}
header button.pri{background:var(--gold);border-color:var(--gold);color:#1a1408;font-weight:600}
.shell{max-width:900px;margin:28px auto;padding:0 18px;display:grid;grid-template-columns:330px 1fr;gap:28px}
@media(max-width:720px){.shell{grid-template-columns:1fr}}
.card-img{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:14px;background:#111;box-shadow:0 10px 40px rgba(0,0,0,.5);display:block}
.card-miss{width:100%;aspect-ratio:4/5;border:1.5px dashed var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#9c7a23;background:#1c1708;text-align:center;padding:20px;font-size:13.5px}
.meta h2{font-size:22px;margin:0 0 12px;line-height:1.4}
.meta .summary{color:#cfcfd4;font-size:15px;line-height:1.75;margin:0 0 22px}
.steps{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.steps h3{font-size:13px;margin:0 0 10px;color:var(--gold)}
.steps ol{margin:0;padding-left:18px;font-size:13.5px;line-height:1.95;color:var(--ink)}
.steps code{background:#0e0e10;padding:1px 6px;border-radius:5px;font-size:12px;color:var(--gold)}
.note{color:var(--dim);font-size:12.5px;margin-top:12px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#000;border:1px solid var(--line);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1} .empty{color:var(--dim);text-align:center;padding:60px 20px;grid-column:1/-1}
</style><script src="config.js"></script></head><body>
<header>
  <h1>자사몰 인사이트 미리보기</h1><span class="sub" id="camp">…</span>
  <div class="rt"><button class="pri" id="dl">카드 PNG 다운로드</button><button id="copytxt">제목+요약 복사</button><a href="./index.html">← 콘솔</a></div>
</header>
<div class="shell" id="shell"><div class="empty">불러오는 중…</div></div>
<div class="toast" id="toast"></div>
<script type="module">
const $=id=>document.getElementById(id);
const q=new URLSearchParams(location.search);
const SB_URL=window.SB_URL, SB_ANON=window.SB_ANON, slug=q.get('slug')||'';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
let card='', title='', summary='';
async function load(){
  if(!(SB_URL&&SB_ANON&&slug)){ $('shell').innerHTML='<div class="empty">slug/연결 없음</div>'; return; }
  const r=await fetch(`${SB_URL}/rest/v1/marketing_drafts?campaign_slug=eq.${encodeURIComponent(slug)}&channel=eq.insight&select=title,body,image_urls`,{headers:{apikey:SB_ANON,Authorization:'Bearer '+SB_ANON}});
  const [row]=await r.json();
  if(!row){ $('shell').innerHTML='<div class="empty">이 캠페인에 자사몰 인사이트가 없습니다.</div>'; return; }
  title=row.title||''; summary=row.body||''; card=(row.image_urls||[])[0]||'';
  $('camp').textContent=title||slug;
  $('shell').innerHTML=`
    <div>${card?`<img class="card-img" src="${esc(card)}" alt="${esc(title)}">`:`<div class="card-miss">🖼 인사이트 카드 이미지 없음<br><small>(canvas 렌더 / publish-insight 필요)</small></div>`}</div>
    <div class="meta">
      <h2>${esc(title)}</h2>
      <p class="summary">${esc(summary)}</p>
      <div class="steps">
        <h3>자사몰에 직접 발행하기</h3>
        <ol>
          <li>위 <b>카드 PNG 다운로드</b> + <b>제목/요약 복사</b></li>
          <li>자사몰 인사이트(<code>melanoir.co.kr</code>) 레포에 카드 추가 — 또는 <code>node scripts/publish-insight.mjs &lt;final&gt; --target &lt;레포&gt;/web/site/insights</code></li>
          <li>커밋/머지 → <a href="https://melanoir.co.kr/insights" target="_blank" style="color:var(--gold)">melanoir.co.kr/insights</a> 라이브</li>
        </ol>
        <div class="note">자사몰은 자동 push가 아니라 <b>브랜드가 직접 발행</b>합니다 (SNS 복붙과 동일한 수동 발행).</div>
      </div>
    </div>`;
}
$('dl').onclick=async()=>{ if(!card){toast('카드 이미지 없음');return;} try{const b=await(await fetch(card)).blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`insight-${slug}.png`;a.click();URL.revokeObjectURL(u);toast('다운로드 시작');}catch{window.open(card,'_blank');toast('새 탭에서 열기')} };
$('copytxt').onclick=async()=>{ try{await navigator.clipboard.writeText((title?title+'\n\n':'')+summary);toast('제목+요약 복사됨');}catch{toast('복사 실패')} };
load().catch(e=>{$('shell').innerHTML='<div class="empty">오류: '+esc(e.message)+'</div>';});
</script></body></html>
